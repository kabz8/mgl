kind = "web"
previewPath = "/"
title = "Milespace - Digital Agency"
version = "1.0.0"
id = "artifacts/milespace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24129

[services.development]
run = "pnpm --filter @workspace/milespace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/milespace", "run", "build" ]
publicDir = "artifacts/milespace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24129"
BASE_PATH = "/"
